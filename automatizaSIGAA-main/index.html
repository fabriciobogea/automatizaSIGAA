<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal SIGAA Moderno</title>
  <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Estilos específicos para a página inicial (portal) */
    body {
      background: linear-gradient(135deg, #f0f4f8 0%, #e9eef3 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 2rem;
      margin: 0;
    }

    .portal-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 2rem;
      margin-top: 2rem;
    }

    .portal-card {
      background: #ffffff;
      border-radius: 1.8rem;
      padding: 2rem 1.8rem;
      text-align: center;
      text-decoration: none;
      color: #1e293b;
      transition: all 0.3s ease;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
      border: 1px solid rgba(226, 232, 240, 0.6);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .portal-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.15);
      border-color: #cbd5e1;
    }

    .portal-icon {
      font-size: 3.5rem;
      background: #f1f5f9;
      width: 80px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 2rem;
      margin-bottom: 0.5rem;
      transition: 0.2s;
    }

    .portal-card:hover .portal-icon {
      background: #e2e8f0;
      transform: scale(1.02);
    }

    .portal-card h3 {
      font-size: 1.5rem;
      font-weight: 700;
      margin: 0;
      color: #0f172a;
    }

    .portal-card p {
      font-size: 0.95rem;
      color: #475569;
      line-height: 1.5;
      margin: 0;
    }

    .form-container {
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(2px);
      border-radius: 2.5rem;
      padding: 2.5rem 2rem;
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.2);
    }

    h1 {
      font-size: 2.2rem;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      font-size: 1rem;
      color: #4b5563;
    }
  </style>
</head>
<body>
<div class="form-container">
  <div style="text-align: center; margin-bottom: 1rem;">
    <h1>🎓 Portal de Gestão Acadêmica</h1>
    <p class="subtitle" style="border: none; padding: 0;">Selecione o módulo que deseja acessar</p>
  </div>

  <div class="portal-grid">
    <a href="cadastro.html" class="portal-card">
      <div class="portal-icon">📝</div>
      <h3>Formulário de Cadastro</h3>
      <p>Acesse o sistema de preenchimento de dados de alunos para inserção no SIGAA.</p>
    </a>

    <a href="ferramentas.html" class="portal-card">
      <div class="portal-icon">⚙️</div>
      <h3>Sistema JSON / Tabelas</h3>
      <p>Importe, visualize e converta bases de dados JSON para o Excel e vice-versa.</p>
    </a>
  </div>
</div>
</body>
</html>
